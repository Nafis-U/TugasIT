<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Shield: Bureaucracy Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Special+Elite&family=Inter:wght@400;700;900&display=swap');
        
        :root {
            --paper-bg: #f8fafc;
            --desk-bg: #0f172a;
            --navy-outline: #1e293b;
            --stamp-red: #ef4444;
            --stamp-green: #22c55e;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--desk-bg);
            color: #f1f5f9;
            margin: 0;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .game-container {
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .screen {
            display: none;
            flex: 1;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .screen.active {
            display: flex;
        }

        /* Kertas Dokumen Modern dengan Outline Navy */
        .post-paper {
            width: 420px;
            min-height: 540px;
            background: var(--paper-bg);
            color: #1e293b;
            padding: 40px;
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.6);
            border: 6px solid var(--navy-outline);
            border-radius: 32px; /* Sudut tidak lancip */
            cursor: grab;
            position: absolute;
            left: 50%;
            top: 45%;
            transform: translate(-50%, -50%);
            z-index: 10;
            font-family: 'Special Elite', cursive;
            transition: transform 0.1s ease, box-shadow 0.2s ease;
            user-select: none;
        }

        .post-paper:active {
            cursor: grabbing;
            z-index: 20;
            transform: translate(-50%, -50%) scale(1.05);
        }

        /* Area Kolom Stempel Besar */
        .stamp-zone {
            position: absolute;
            bottom: 40px;
            width: 320px;
            height: 200px;
            border: 6px dashed rgba(255,255,255,0.15);
            border-radius: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 2rem;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .stamp-approve {
            right: 8%;
            color: var(--stamp-green);
            background: rgba(34, 197, 94, 0.05);
        }

        .stamp-deny {
            left: 8%;
            color: var(--stamp-red);
            background: rgba(239, 68, 68, 0.05);
        }

        .zone-highlight {
            background: rgba(255,255,255,0.1);
            transform: scale(1.1);
            border-color: currentColor;
            box-shadow: 0 0 50px rgba(255,255,255,0.1);
        }

        .stamp-icon {
            font-size: 3.5rem;
            margin-bottom: 10px;
        }

        /* Header UI */
        .office-header {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            padding: 20px 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid rgba(255,255,255,0.1);
            width: 100%;
            z-index: 100;
        }

        .status-badge {
            background: #1e293b;
            padding: 8px 20px;
            border-radius: 12px;
            font-family: 'Special Elite', cursive;
            border: 1px solid rgba(255,255,255,0.1);
        }

    </style>
</head>
<body>

    <div class="game-container">
        <!-- HEADER -->
        <div class="office-header">
            <div class="flex items-center gap-6">
                <span class="text-2xl font-black text-blue-500 italic">SOCIAL SHIELD</span>
                <span id="player-display" class="status-badge text-slate-300">PETUGAS: -</span>
            </div>
            <div class="flex items-center gap-12 font-bold">
                <div class="text-yellow-500 text-xl">SKOR: <span id="score-val" class="tabular-nums">0</span></div>
                <div class="text-red-500 text-xl font-black">JAM: <span id="time-val" class="tabular-nums">16:00</span></div>
            </div>
        </div>

        <!-- LOBBY -->
        <div id="screen-lobby" class="screen active">
            <h1 class="text-8xl font-black mb-6 italic" style="font-family: 'Special Elite';">BUREAUCRACY</h1>
            <p class="text-slate-400 mb-12 text-xl italic font-light text-center">
                Filter konten internet demi kebaikan bersama.<br>
                Tarik dokumen ke area stempel untuk memproses.
            </p>
            
            <input type="text" id="name-input" placeholder="NAMA PETUGAS" class="mb-10 px-10 py-5 bg-slate-800 border-4 border-slate-700 text-white font-black text-2xl text-center w-96 rounded-2xl focus:outline-none focus:border-blue-500">
            
            <button onclick="initGame()" class="px-20 py-5 bg-blue-600 hover:bg-blue-500 font-black text-2xl rounded-2xl shadow-2xl border-b-8 border-blue-900 transition-all active:translate-y-2 active:border-b-0">MULAI SHIFT</button>
        </div>

        <!-- GAMEPLAY -->
        <div id="screen-game" class="screen">
            <div id="zone-deny" class="stamp-zone stamp-deny">
                <span class="stamp-icon">🚫</span>
                <span>BLOKIR</span>
            </div>
            <div id="zone-approve" class="stamp-zone stamp-approve">
                <span class="stamp-icon">✅</span>
                <span>SETUJU</span>
            </div>

            <div id="paper-container"></div>
        </div>

        <!-- RESULT -->
        <div id="screen-result" class="screen">
            <h2 class="text-6xl font-black mb-8" style="font-family: 'Special Elite';">HASIL EVALUASI</h2>
            <div class="bg-slate-800/50 p-12 w-[500px] rounded-3xl border-4 border-slate-700 mb-12 backdrop-blur-xl">
                <div class="space-y-6 text-2xl">
                    <p class="flex justify-between">Konten Diperiksa: <span id="stat-total" class="font-black">0</span></p>
                    <p class="flex justify-between text-red-400">Pelanggaran Prosedur: <span id="stat-wrong" class="font-black">0</span></p>
                    <div class="h-px bg-slate-600 my-4"></div>
                    <p class="text-sm text-slate-400 uppercase tracking-widest text-center">Gaji Shift Ini</p>
                    <div class="text-6xl font-black text-green-400 text-center" id="stat-salary">Rp 0</div>
                </div>
            </div>
            <button onclick="location.reload()" class="px-16 py-4 bg-slate-700 hover:bg-slate-600 font-bold text-xl rounded-xl">KEMBALI KE POS</button>
        </div>
    </div>

    <script>
        const database = [
            { user: "User_88", text: "Halo semuanya! Selamat pagi dan tetap semangat ya.", safe: true },
            { user: "Bot_X", text: "DAPATKAN HADIAH 1M SEKARANG JUGA! KLIK LINK INI!!!", safe: false },
            { user: "Student_01", text: "Mengapa matahari sangat panas? Berikut adalah penjelasannya.", safe: true },
            { user: "TrollMaster", text: "Kamu semua bodoh dan tidak tahu apa-apa! Pergi sana!", safe: false },
            { user: "News_Daily", text: "Pemerintah mengumumkan kebijakan baru mengenai pajak.", safe: true },
            { user: "Spammer_99", text: "BELI FOLLOWER MURAH! DM UNTUK HARGA TERBAIK!!!", safe: false },
            { user: "Science_Lover", text: "Teori relativitas Einstein menjelaskan tentang ruang waktu.", safe: true },
            { user: "Hacker_Z", text: "Download file ini untuk cheat game gratis. 100% work.", safe: false },
            { user: "Meme_Lord", text: "SKIBIDI TOILET RIZZLER FANUM TAX GYATT!!!", safe: false },
            { user: "Mom_Cook", text: "Resep nasi goreng spesial untuk sarapan anak.", safe: true }
        ];

        let score = 0, wrong = 0, total = 0, timeLeft = 60;
        let isDragging = false, currentPaper = null, startX, startY;

        function initGame() {
            const name = document.getElementById('name-input').value || "PETUGAS";
            document.getElementById('player-display').innerText = "PETUGAS: " + name.toUpperCase();
            document.getElementById('screen-lobby').classList.remove('active');
            document.getElementById('screen-game').classList.add('active');
            
            spawnPaper();
            const timer = setInterval(() => {
                timeLeft--;
                const sec = timeLeft % 60;
                document.getElementById('time-val').innerText = `16:${sec < 10 ? '0' + sec : sec}`;
                if (timeLeft <= 0) { clearInterval(timer); showResult(); }
            }, 1000);
        }

        function spawnPaper() {
            const container = document.getElementById('paper-container');
            container.innerHTML = '';
            const data = database[Math.floor(Math.random() * database.length)];
            const paper = document.createElement('div');
            paper.className = 'post-paper';
            paper.dataset.safe = data.safe;
            
            paper.innerHTML = `
                <div class="flex justify-between items-center border-b-4 border-slate-200 mb-8 pb-2">
                    <span class="text-xs font-bold opacity-30">SOCIAL_FEED_V4</span>
                    <span class="text-xs font-bold opacity-30">#${Math.floor(Math.random()*9000+1000)}</span>
                </div>
                <div class="mb-8">
                    <div class="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-1">Pengirim</div>
                    <div class="text-2xl font-bold border-b border-slate-100 pb-2">${data.user}</div>
                </div>
                <div class="mb-12">
                    <div class="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-2">Konten</div>
                    <div class="text-3xl leading-snug italic">"${data.text}"</div>
                </div>
                <div class="mt-auto pt-6 border-t-2 border-slate-100 flex justify-center opacity-20">
                    <div class="text-[10px] font-black">MINISTRY OF TRUTH</div>
                </div>
            `;

            container.appendChild(paper);
            currentPaper = paper;
            paper.addEventListener('mousedown', startDrag);
            window.addEventListener('mousemove', drag);
            window.addEventListener('mouseup', stopDrag);
        }

        function startDrag(e) {
            isDragging = true;
            startX = e.clientX - currentPaper.offsetLeft;
            startY = e.clientY - currentPaper.offsetTop;
            currentPaper.style.transition = 'none';
        }

        function drag(e) {
            if (!isDragging) return;
            currentPaper.style.left = (e.clientX - startX) + 'px';
            currentPaper.style.top = (e.clientY - startY) + 'px';

            const sw = window.innerWidth, sh = window.innerHeight;
            if (e.clientY > sh * 0.4) {
                if (e.clientX > sw * 0.6) {
                    document.getElementById('zone-approve').classList.add('zone-highlight');
                } else if (e.clientX < sw * 0.4) {
                    document.getElementById('zone-deny').classList.add('zone-highlight');
                } else {
                    document.querySelectorAll('.stamp-zone').forEach(z => z.classList.remove('zone-highlight'));
                }
            }
        }

        function stopDrag(e) {
            if (!isDragging) return;
            isDragging = false;
            const sw = window.innerWidth, sh = window.innerHeight;
            const isSafe = currentPaper.dataset.safe === "true";
            
            if (e.clientY > sh * 0.4) {
                if (e.clientX > sw * 0.6) processResult(isSafe === true);
                else if (e.clientX < sw * 0.4) processResult(isSafe === false);
                else resetPaper();
            } else resetPaper();
            
            document.querySelectorAll('.stamp-zone').forEach(z => z.classList.remove('zone-highlight'));
        }

        function resetPaper() {
            currentPaper.style.transition = 'all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
            currentPaper.style.left = '50%'; currentPaper.style.top = '45%';
        }

        function processResult(correct) {
            total++;
            if (correct) score += 100; else { wrong++; score = Math.max(0, score - 50); }
            document.getElementById('score-val').innerText = score;
            currentPaper.style.transition = 'all 0.4s ease-in';
            currentPaper.style.transform = `translate(-50%, 150%)`;
            currentPaper.style.opacity = '0';
            setTimeout(spawnPaper, 400);
        }

        function showResult() {
            document.getElementById('screen-game').classList.remove('active');
            document.getElementById('screen-result').classList.add('active');
            document.getElementById('stat-total').innerText = total;
            document.getElementById('stat-wrong').innerText = wrong;
            document.getElementById('stat-salary').innerText = "Rp " + (score * 1000).toLocaleString('id-ID');
        }
    </script>
</body>
</html>
