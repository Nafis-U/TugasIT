<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Shield: Future Mod</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&family=JetBrains+Mono:wght@500&display=swap');
        
        :root {
            --bg-dark: #020617;
            --accent-blue: #3b82f6;
            --accent-red: #ef4444;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-dark);
            color: #f8fafc;
            margin: 0;
            overflow: hidden;
            height: 100vh;
        }

        /* Container Utama */
        .dashboard {
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: radial-gradient(circle at 50% -20%, #1e293b 0%, #020617 80%);
        }

        /* Kartu Konten Modern */
        .content-card {
            width: 500px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 2px solid var(--accent-blue);
            border-radius: 40px;
            padding: 48px;
            box-shadow: 0 0 80px rgba(59, 130, 246, 0.15);
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        /* Kata Terlarang (Highlight) */
        .term {
            color: #94a3b8;
            padding: 2px 6px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
            font-weight: 700;
        }

        .term:hover {
            border-color: var(--accent-blue);
            color: var(--accent-blue);
            background: rgba(59, 130, 246, 0.1);
        }

        .term.detected {
            background: var(--accent-red);
            color: white;
            border-color: var(--accent-red);
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.4);
            text-decoration: line-through;
        }

        /* Tombol Aksi */
        .action-zone {
            position: absolute;
            bottom: 60px;
            width: 320px;
            height: 120px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            font-weight: 800;
            letter-spacing: 2px;
            transition: all 0.3s;
            opacity: 0.1;
            pointer-events: none;
            border: 2px solid transparent;
        }

        .zone-active {
            opacity: 1;
            pointer-events: auto;
            cursor: pointer;
        }

        .btn-deny {
            left: 10%;
            background: rgba(239, 68, 68, 0.1);
            border-color: var(--accent-red);
            color: var(--accent-red);
        }

        .btn-approve {
            right: 10%;
            background: rgba(34, 197, 94, 0.1);
            border-color: #22c55e;
            color: #22c55e;
        }

        .zone-active:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px -10px currentColor;
        }

        /* Animasi Shake untuk Error */
        @keyframes shake {
            0%, 100% { transform: translate(-50%, -50%); }
            25% { transform: translate(-52%, -50%); }
            75% { transform: translate(-48%, -50%); }
        }

        .error-shake { animation: shake 0.2s ease-in-out 2; }

    </style>
</head>
<body>

    <div class="dashboard">
        <!-- HEADER -->
        <header class="p-8 flex justify-between items-center border-b border-white/5">
            <div>
                <h1 class="text-xl font-extrabold tracking-tighter text-blue-400">SHIELD//OS v2.0</h1>
                <p class="text-xs text-slate-500 font-mono">NEURAL CONTENT MODERATOR</p>
            </div>
            <div class="flex gap-12 font-mono">
                <div class="text-right">
                    <p class="text-[10px] text-slate-500">TRUST_SCORE</p>
                    <p id="score-val" class="text-2xl font-bold text-blue-400">000</p>
                </div>
                <div class="text-right">
                    <p class="text-[10px] text-slate-500">SHIFT_TIMER</p>
                    <p id="time-val" class="text-2xl font-bold text-white">00:60</p>
                </div>
            </div>
        </header>

        <!-- GAME AREA -->
        <main class="flex-1 relative">
            <div id="card-container"></div>

            <!-- ACTION ZONES -->
            <div id="btn-deny" onclick="submitDecision(false)" class="action-zone btn-deny">
                TERMINATE
            </div>
            <div id="btn-approve" onclick="submitDecision(true)" class="action-zone btn-approve">
                AUTHORIZE
            </div>
        </main>

        <!-- LOBBY OVERLAY -->
        <div id="lobby" class="absolute inset-0 bg-slate-950 z-50 flex flex-col items-center justify-center p-6">
            <div class="max-w-md w-full">
                <h2 class="text-6xl font-extrabold mb-2 tracking-tighter italic">SCANNER.</h2>
                <p class="text-slate-400 mb-12 text-lg">Hancurkan konten brainrot sebelum menginfeksi jaringan.</p>
                
                <div class="space-y-4">
                    <input type="text" id="player-name" placeholder="IDENTITAS PETUGAS" class="w-full bg-white/5 border-2 border-white/10 p-5 rounded-2xl text-xl font-bold focus:outline-none focus:border-blue-500 transition-all">
                    <button onclick="startShift()" class="w-full bg-blue-600 hover:bg-blue-500 p-5 rounded-2xl text-xl font-extrabold transition-all">INISIASI SISTEM</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const brainrotTerms = ["SKIBIDI", "GYATT", "RIZZ", "FANUM", "OHIO", "SIGMA", "MEWING", "MOGGING"];
        const database = [
            { t: "Lagi asik MEWING eh kena tagihan FANUM tax sama temen.", isRot: true },
            { t: "Siapa sangka RIZZ dari OHIO bisa bikin geger sekelas.", isRot: true },
            { t: "Bocah itu teriak SKIBIDI di tengah perpustakaan tadi pagi.", isRot: true },
            { t: "Kemarin saya makan nasi padang enak sekali rasanya.", isRot: false },
            { t: "Belajar coding itu butuh logika dan kesabaran tinggi.", isRot: false },
            { t: "Gaya MOGGING dia bener-bener level SIGMA sejati.", isRot: true },
            { t: "Matahari terbit dari timur dan tenggelam di barat.", isRot: false }
        ];

        let score = 0;
        let timeLeft = 60;
        let detectedCount = 0;
        let requiredInCase = 0;
        let currentCase = null;

        function startShift() {
            const name = document.getElementById('player-name').value || "USER_1";
            document.getElementById('lobby').style.opacity = '0';
            setTimeout(() => document.getElementById('lobby').style.display = 'none', 500);
            
            spawnCase();
            const timer = setInterval(() => {
                timeLeft--;
                document.getElementById('time-val').innerText = `00:${timeLeft < 10 ? '0'+timeLeft : timeLeft}`;
                if(timeLeft <= 0) {
                    clearInterval(timer);
                    alert("SHIFT SELESAI. Total Score: " + score);
                    location.reload();
                }
            }, 1000);
        }

        function spawnCase() {
            detectedCount = 0;
            currentCase = database[Math.floor(Math.random() * database.length)];
            
            // Reset UI
            document.getElementById('btn-deny').classList.remove('zone-active');
            document.getElementById('btn-approve').classList.remove('zone-active');
            
            // Proses Teks
            let textHtml = currentCase.t;
            requiredInCase = 0;
            
            brainrotTerms.forEach(term => {
                const regex = new RegExp(term, 'gi');
                if(textHtml.match(regex)) {
                    requiredInCase++;
                    textHtml = textHtml.replace(regex, `<span class="term" onclick="detect(this)">${term}</span>`);
                }
            });

            const container = document.getElementById('card-container');
            container.innerHTML = `
                <div class="content-card" id="active-card">
                    <div class="mb-8 flex justify-between items-center">
                        <div class="h-2 w-12 bg-blue-500 rounded-full"></div>
                        <div class="font-mono text-[10px] text-slate-500">REF_ID: ${Math.random().toString(36).substr(2, 9).toUpperCase()}</div>
                    </div>
                    <h3 class="text-3xl font-bold leading-tight tracking-tight mb-12" id="text-body">
                        "${textHtml}"
                    </h3>
                    <div class="pt-6 border-t border-white/5 flex justify-between items-center">
                        <span class="text-[10px] font-mono text-slate-500">SCAN_PROGRESS</span>
                        <span id="prog-val" class="font-mono text-blue-400">0%</span>
                    </div>
                </div>
            `;

            // Jika konten bersih, langsung aktifkan Authorize
            if(requiredInCase === 0) {
                document.getElementById('btn-approve').classList.add('zone-active');
                document.getElementById('prog-val').innerText = "CLEAN";
            }
        }

        function detect(el) {
            if(el.classList.contains('detected')) return;
            
            el.classList.add('detected');
            detectedCount++;
            
            const prog = Math.round((detectedCount / requiredInCase) * 100);
            document.getElementById('prog-val').innerText = prog + "%";

            if(detectedCount >= requiredInCase) {
                document.getElementById('btn-deny').classList.add('zone-active');
                document.getElementById('prog-val').innerText = "INFECTED";
                document.getElementById('prog-val').classList.replace('text-blue-400', 'text-red-500');
            }
        }

        function submitDecision(isApprove) {
            const card = document.getElementById('active-card');
            
            if(isApprove === !currentCase.isRot) {
                // Jawaban Benar
                score += 100;
                card.style.transform = `translate(${isApprove ? '200%' : '-200%'}, -50%) rotate(${isApprove ? 20 : -20}deg)`;
                card.style.opacity = '0';
            } else {
                // Jawaban Salah
                score = Math.max(0, score - 50);
                card.classList.add('error-shake');
                setTimeout(() => card.classList.remove('error-shake'), 400);
                return; // Jangan spawn dulu, biarkan mereka perbaiki atau coba lagi
            }

            document.getElementById('score-val').innerText = score.toString().padStart(3, '0');
            setTimeout(spawnCase, 500);
        }
    </script>
</body>
</html>
